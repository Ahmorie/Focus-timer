<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="34" r="26" fill="#000" stroke="#fff" stroke-width="3"/>

  <!-- Top button -->
  <rect x="28" y="4" width="8" height="6" rx="2" fill="#fff"/>

  <!-- Tick marks -->
  <line x1="32" y1="11" x2="32" y2="14" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="34" x2="47" y2="34" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="57" x2="32" y2="54" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <line x1="14" y1="34" x2="17" y2="34" stroke="#fff" stroke-width="2" stroke-linecap="round"/>

  <!-- Hour hand (short) -->
  <line x1="32" y1="34" x2="32" y2="24" stroke="#fff" stroke-width="3" stroke-linecap="round"/>

  <!-- Minute hand (long) -->
  <line x1="32" y1="34" x2="42" y2="22" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="32" cy="34" r="3" fill="#fff"/>
</svg>
